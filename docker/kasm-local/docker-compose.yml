# One flexible Chrome browser for JobSeek (not a full desktop OS).
# Viewer (HTTPS): https://127.0.0.1:6911/?resize=remote
# CDP:            http://127.0.0.1:9333
# JobSeek gates Watch behind sign-in; KasmVNC basic auth is disabled locally.

services:
  kasm-chrome-1:
    image: kasmweb/chrome:1.17.0
    container_name: jobseek-kasm-1
    restart: unless-stopped
    shm_size: "2gb"
    ports:
      - "127.0.0.1:6911:6901"
      - "127.0.0.1:9333:9223"
    environment:
      # Start large; ?resize=remote makes the desktop follow the client window.
      VNC_RESOLUTION: "1920x1080"
      VNCOPTIONS: "-disableBasicAuth -AcceptSetDesktopSize 1"
      APP_ARGS: >-
        --remote-debugging-port=9222
        --remote-allow-origins=*
        --user-data-dir=/home/kasm-user/chrome-cdp
        --start-maximized
        --no-first-run
        --disable-session-crashed-bubble
        --window-size=1920,1080

  kasm-cdp-1:
    image: alpine/socat
    network_mode: "service:kasm-chrome-1"
    depends_on:
      - kasm-chrome-1
    restart: unless-stopped
    command: ["TCP-LISTEN:9223,fork,reuseaddr", "TCP:127.0.0.1:9222"]
